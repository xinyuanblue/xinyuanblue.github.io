<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>河洛书苑 - 洛阳城市书房数据分析</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- 引入ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script type="text/javascript" src="https://api.map.baidu.com/api?v=3.0&ak=m1ZuPJqnc13Ztl4XsIZV3pz5LK5WngYY"></script>
</head>
<body>
    <!-- 导航栏 -->
    <nav class="main-nav">
        <div class="nav-container">
            <h1>河洛书苑</h1>
            <ul>
                <li><a href="#overview">总体概况</a></li>
                <li><a href="#distribution">空间布局</a></li>
                <li><a href="#operation">运营管理</a></li>
                <li><a href="#service">服务效能</a></li>
                <li><a href="#user-analysis">用户分析</a></li>
                <li><a href="#comparison">区域对比</a></li>
            </ul>
        </div>
    </nav>

    <!-- 头部大图 -->
    <header class="hero">
        <div class="hero-content">
            <h2>洛阳城市书房发展现状数据分析</h2>
            <p>以数据视角解读"河洛书苑"建设成果</p>
        </div>
    </header>

    <!-- 主要内容区域 -->
    <main>
        <!-- 总体概况部分 -->
        <section id="overview" class="section">
            <h2>总体概况</h2>
            <div class="data-visualization">
                <!-- 放置总体数据图表 -->
                <div id="overviewChart" class="chart"></div>
            </div>
        </section>

        <!-- 空间布局部分 -->
        <section id="distribution" class="section">
            <h2>空间布局</h2>
            <div class="map-container">
                <div id="baiduMap" class="map"></div>
                <div class="map-legend">
                    <h4>图例说明</h4>
                    <div class="legend-item">
                        <span class="dot"></span>
                        <span>城市书房位置</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- 运营管理部分 -->
        <section id="operation" class="section">
            <h2>运营管理</h2>
            <div class="data-visualization">
                <!-- 放置运营数据图表 -->
                <div id="operationChart" class="chart"></div>
            </div>
        </section>

        <!-- 服务效能部分 -->
        <section id="service" class="section">
            <h2>服务效能</h2>
            <div class="data-visualization">
                <!-- 放置服务数据图表 -->
                <div id="serviceChart" class="chart"></div>
            </div>
        </section>

        <!-- 用户分析部分 -->
        <section id="user-analysis" class="section">
            <h2>用户分析</h2>
            <div class="data-visualization">
                <!-- 放置用户画像图表 -->
                <div id="userChart" class="chart"></div>
            </div>
        </section>

        <!-- 区域对比部分 -->
        <section id="comparison" class="section">
            <h2>区域对比</h2>
            <div class="data-visualization">
                <!-- 放置城市对比图表 -->
                <div id="comparisonChart" class="chart"></div>
            </div>
        </section>
    </main>

    <!-- 页脚部分 -->
    <footer>
        <div class="about-us tri-column">
            <div>
                <h3>指导老师</h3>
                <p>万鹏</p>
            </div>
            <div>
                <h3>制作</h3>
                <p>李心愿</p>
            </div>
            <div>
                <h3>出品</h3>
                <p>平顶山学院新闻与传播学院</p>
            </div>
        </div>
        <div class="copyright">
            © Copyright 2024 - All rights reserved.
        </div>
        <div class="disclaimer">
            <p><strong>声明：</strong>该项目仅用于教育目的</p>
        </div>
    </footer>

    <!-- 引入JS文件 -->
    <script src="js/charts.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
