<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据新闻《数据视角下城市书房发展研究——以“河洛书苑”为例》</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/nav.css">
    <link rel="stylesheet" href="css/map.css">
    <link rel="stylesheet" href="css/charts.css">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
</head>
<body>
    <nav class="main-nav">
        <div class="nav-container">
            <div class="logo">
                <span class="logo-text">河洛书苑</span>
            </div>
            <div class="nav-sections">
                <a href="#overview" class="nav-item">
                    <span>总体概况</span>
                </a>
                <a href="#distribution" class="nav-item">
                    <span>空间布局</span>
                </a>
                <a href="#operation" class="nav-item">
                    <span>运营管理</span>
                </a>
                <a href="#service" class="nav-item">
                    <span>服务效能</span>
                </a>
                <a href="#user-analysis" class="nav-item">
                    <span>用户分析</span>
                </a>
                <a href="#comparison" class="nav-item">
                    <span>区域对比</span>
                </a>
            </div>
        </div>
    </nav>

    <section class="hero scroll-section">
        <div class="hero-container">
            <h1 class="highlight-text">河洛书苑</h1>
            <div class="intro-text">
                <p class="intro-description">
                    以数据视角解读洛阳城市书房发展现状，
                    深入分析"河洛书苑"在推动全民阅读中的典型经验。
                </p>
            </div>
        </div>
    </section>

    <main>
        <section id="overview" class="scroll-section">
            <div class="section-container">
                <h2>总体概况</h2>
                <div class="case-study">
                    <div class="visualization-container">
                        <div id="overviewChart" class="chart"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="distribution" class="scroll-section">
            <div class="section-container">
                <h2>空间布局</h2>
                <div class="case-study">
                    <div class="map-container">
                        <div class="loading-indicator" id="loadingIndicator">
                            <div class="spinner"></div>
                            <span>加载中...</span>
                        </div>
                        <div id="container"></div>
                        <div class="control-panel">
                            <div class="search-box">
                                <input type="text" placeholder="搜索书房名称..." id="searchInput">
                            </div>
                            <div class="district-filter">
                                <label><input type="checkbox" value="all" checked> 全部区域</label>
                                <label><input type="checkbox" value="西工区" checked> 西工区</label>
                                <label><input type="checkbox" value="涧西区" checked> 涧西区</label>
                                <label><input type="checkbox" value="老城区" checked> 老城区</label>
                                <label><input type="checkbox" value="瀍河区" checked> 瀍河区</label>
                            </div>
                        </div>
                        <div class="map-legend">
                            <h4>图例说明</h4>
                            <div class="legend-item">
                                <span class="dot"></span>
                                <span>城市书房位置</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>

        <section id="operation" class="scroll-section">
            <div class="section-container">
                <h2>运营管理</h2>
                <div class="case-study">
                    <div class="data-visualization">
                        <div id="operationChart" class="chart"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="service" class="scroll-section">
            <div class="section-container">
                <h2>服务效能</h2>
                <div class="case-study">
                    <div class="data-visualization">
                        <div id="serviceChart" class="chart"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="user-analysis" class="scroll-section">
            <div class="section-container">
                <h2>用户分析</h2>
                <div class="case-study">
                    <div class="data-visualization">
                        <div id="userChart" class="chart"></div>
                    </div>
                </div>
            </div>
        </section>

        <section id="comparison" class="scroll-section">
            <div class="section-container">
                <h2>区域对比</h2>
                <div class="case-study">
                    <div class="data-visualization">
                        <div id="comparisonChart" class="chart"></div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <div class="about-us tri-column">
            <div>
                <h3>指导老师</h3>
                <p>万鹏</p>
            </div>
            <div>
                <h3>制作</h3>
                <p>李心愿</p>
            </div>
            <div>
                <h3>出品</h3>
                <p>平顶山学院新闻与传播学院</p>
            </div>
        </div>

            © Copyright 2024 - All rights reserved.
        </div>
        <div class="disclaimer">
            <p><strong>声明：</strong>该项目仅用于教育目的</p>
        </div>
    </footer>

        window._AMapSecurityConfig = {
            securityJsCode: 'e790abe110f796deb3749aab5126bb89'
        }
    </script>

    <script src="js/bookroom_data.js"></script>
    <script src="js/map.js"></script>
    <script src="js/charts.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/main.js"></script>

        document.addEventListener('DOMContentLoaded', function() {
            if (typeof initMap === 'function') {
                initMap();

        });
    </script>
</body>
</html>
